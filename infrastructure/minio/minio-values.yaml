# set MinIO values for my S3 bucket

rootUser: "admin"
rootPassword: "admin123"

mode: standalone # instead of "distributed" cluster mode

# set the buckets the server will automatically create in deployment
buckets:
 - name: "lakehouse-bucket"
   policy: public
   purge: false # whether to delete all objects in the bucket when the bucket is deleted

# resource configuration
resources:
  requests:
    memory: "256Mi"
    cpu: "100m" # milllicores are parts of a core: 100m = 0.1 cores